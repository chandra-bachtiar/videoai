<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoAI — AI Video Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14; --surface: #141428; --surface2: #1e1e38; --border: #2a2a4a;
    --primary: #a855f7; --primary-glow: #a855f744; --accent: #f97316;
    --text: #e8e0f0; --text2: #8b80a0; --danger: #ef4444; --radius: 14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,#7c3aed12,#0000 60%),radial-gradient(ellipse 40% 50% at 80% 80%,#f9731608,#0000 50%);pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:2rem}
  .header{text-align:center;margin-bottom:2rem}
  .header h1{font-size:2.4rem;font-weight:700;background:linear-gradient(135deg,#c084fc,#a855f7,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header p{color:var(--text2);margin-top:.4rem}
  .header .badge{margin-top:.6rem;padding:.25rem .8rem;background:var(--surface2);border:1px solid var(--border);border-radius:99px;font-size:.78rem;color:var(--text2);display:inline-block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:1.2rem}
  .card-title{font-size:1.05rem;font-weight:600;margin-bottom:1rem;color:var(--text)}
  textarea,select{width:100%;padding:.85rem 1rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.95rem;transition:border-color .2s}
  textarea{resize:vertical;min-height:140px;line-height:1.65}
  textarea:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
  .row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.2rem}
  .row>*{flex:1;min-width:140px}
  button{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:1rem 2rem;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;border:none;border-radius:12px;font-size:1.05rem;font-weight:600;cursor:pointer;transition:all .2s;width:100%}
  button:hover{transform:translateY(-1px);box-shadow:0 8px 30px var(--primary-glow)}
  button:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
  .status{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;margin:1rem 0;display:flex;align-items:center;gap:.8rem;font-size:.9rem}
  .status.processing{border-color:var(--accent);color:var(--accent)}
  .status.success{border-color:#22c55e;color:#22c55e}
  .status.error{border-color:var(--danger);color:var(--danger)}
  .spinner{width:18px;height:18px;border:2.5px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .result video{border-radius:12px;width:100%;margin-top:.5rem}
  .result .meta{color:var(--text2);font-size:.85rem;margin-top:.8rem}
  .login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;max-width:420px;width:100%;text-align:center}
  .login-card h2{font-size:1.5rem;margin-bottom:.5rem}
  .login-card p{color:var(--text2);margin-bottom:1.5rem;font-size:.9rem}
  .login-card input{width:100%;padding:.85rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:.95rem;text-align:center}
  .login-card button{width:100%;margin-top:1rem}
  .footer{text-align:center;padding:2rem;color:var(--text2);font-size:.8rem;border-top:1px solid var(--border);margin-top:2rem}
  .footer a{color:var(--primary)}
  .hint{font-size:.78rem;color:var(--text2);margin-top:.3rem}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
let apiKey = localStorage.getItem('vai_apikey');

if (!apiKey) renderLogin();
else renderApp();

function renderLogin() {
  document.getElementById('app').innerHTML = `
    <div class="login-page">
      <div class="login-card">
        <h2>🔑 TokenRouter API Key</h2>
        <p>Masukkan API key TokenRouter untuk generate video AI.</p>
        <input id="keyInput" type="password" placeholder="sk-...">
        <p class="hint">Dapat dari <a href="https://tokenrouter.com" target="_blank" style="color:var(--primary)">tokenrouter.com</a></p>
        <button onclick="doLogin()">Simpan & Lanjutkan</button>
        <p id="loginError" style="color:var(--danger);margin-top:.8rem;font-size:.85rem;display:none"></p>
      </div>
    </div>`;
}

async function doLogin() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key.startsWith('sk-')) {
    document.getElementById('loginError').textContent = 'Format: sk-...';
    document.getElementById('loginError').style.display = 'block'; return;
  }
  try {
    const res = await fetch('/api/health', { headers: { 'X-API-Key': key }});
    if (res.status === 401) {
      document.getElementById('loginError').textContent = 'Key tidak valid';
      document.getElementById('loginError').style.display = 'block'; return;
    }
    localStorage.setItem('vai_apikey', key);
    location.reload();
  } catch(e) {
    document.getElementById('loginError').textContent = 'Gagal koneksi ke server';
    document.getElementById('loginError').style.display = 'block';
  }
}

function renderApp() {
  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>🎬 VideoAI Generator</h1>
      <p>Kling 3 Omni · Kling Turbo · Hailuo 2.3</p>
      <span class="badge">${apiKey.substring(0,8)}... · <a href="#" onclick="logout()" style="color:var(--text2)">ganti</a></span>
    </div>

    <div class="card">
      <div class="card-title">📝 Prompt</div>
      <textarea id="prompt" placeholder="Deskripsikan video yang mau dibuat...
Contoh: A cinematic drone shot of a futuristic city at sunset, neon lights reflecting on wet streets, slow camera pan, 4K quality."></textarea>
      <p class="hint">Text-to-video — makin detail deskripsi, makin bagus hasilnya.</p>
    </div>

    <div class="row">
      <div class="card" style="flex:1;margin-bottom:0">
        <div class="card-title">🤖 Model</div>
        <select id="model">
          <option value="kling-v3-omni">🎬 Kling 3 Omni (best)</option>
          <option value="kling-3.0-turbo">⚡ Kling 3.0 Turbo (fast)</option>
          <option value="kling-v3">🎥 Kling v3</option>
          <option value="kling-v2-6">🎞️ Kling 2.6</option>
          <option value="MiniMax-Hailuo-2.3">🌊 Hailuo 2.3</option>
        </select>
      </div>
      <div class="card" style="flex:1;margin-bottom:0">
        <div class="card-title">⏱️ Durasi</div>
        <select id="duration">
          <option value="5">5 detik</option>
          <option value="10">10 detik</option>
          <option value="15">15 detik</option>
        </select>
      </div>
      <div class="card" style="flex:1;margin-bottom:0">
        <div class="card-title">🎯 Mode</div>
        <select id="mode">
          <option value="std">Standard</option>
          <option value="pro">Pro (lebih detail)</option>
        </select>
      </div>
      <div class="card" style="flex:1;margin-bottom:0">
        <div class="card-title">📐 Rasio</div>
        <select id="aspectRatio">
          <option value="16:9">16:9 · Landscape</option>
          <option value="9:16">9:16 · Portrait</option>
          <option value="1:1">1:1 · Square</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
        </select>
      </div>
    </div>

    <button id="submitBtn" onclick="generate()">🚀 Generate Video</button>
    <div id="statusArea"></div>
    <div id="resultArea"></div>
    <div class="footer">VideoAI · Powered by <a href="https://tokenrouter.com" target="_blank">TokenRouter</a></div>
  `;
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return alert('Prompt wajib diisi!');

  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('statusArea');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  status.innerHTML = '<div class="status processing"><span class="spinner"></span> Mengirim...</div>';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
      body: JSON.stringify({
        prompt,
        model: document.getElementById('model').value,
        duration: document.getElementById('duration').value,
        mode: document.getElementById('mode').value,
        aspectRatio: document.getElementById('aspectRatio').value,
      })
    });
    const data = await res.json();

    if (data.task_id) {
      status.innerHTML = `<div class="status processing"><span class="spinner"></span> Task: <b>${data.task_id}</b> — processing...</div>`;
      pollStatus(data.task_id);
    } else if (data.error) {
      status.innerHTML = `<div class="status error">❌ ${data.error.message || JSON.stringify(data.error)}</div>`;
      btn.disabled = false; btn.innerHTML = '🚀 Generate Video';
    } else {
      status.innerHTML = '<div class="status success">✅ Selesai!</div>';
      showResult(data);
      btn.disabled = false; btn.innerHTML = '🚀 Generate Video';
    }
  } catch(err) {
    status.innerHTML = `<div class="status error">❌ ${err.message}</div>`;
    btn.disabled = false; btn.innerHTML = '🚀 Generate Video';
  }
}

async function pollStatus(taskId) {
  const status = document.getElementById('statusArea');
  let attempts = 0;
  while (attempts < 60) {
    await new Promise(r => setTimeout(r, 5000));
    try {
      const res = await fetch(`/api/status/${taskId}`, { headers: { 'X-API-Key': apiKey }});
      const data = await res.json();
      if (data.status === 'completed' || data.output) {
        status.innerHTML = '<div class="status success">✅ Selesai!</div>';
        showResult(data);
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerHTML = '🚀 Generate Video';
        return;
      }
      if (data.status === 'failed') {
        status.innerHTML = `<div class="status error">❌ Gagal: ${data.error || 'Unknown'}</div>`;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerHTML = '🚀 Generate Video';
        return;
      }
      status.innerHTML = `<div class="status processing"><span class="spinner"></span> Processing... (${++attempts}/60)</div>`;
    } catch(err) { status.innerHTML = `<div class="status error">❌ ${err.message}</div>`; return; }
  }
  status.innerHTML = `<div class="status error">⏰ Timeout — cek: ${taskId}</div>`;
}

function showResult(data) {
  const r = document.getElementById('resultArea');
  const url = Array.isArray(data.output) ? data.output[0] : data.output;
  if (url) r.innerHTML = `<div class="card result"><div class="card-title">🎬 Hasil</div><video controls autoplay loop><source src="${url}" type="video/mp4"></video><div class="meta">📥 <a href="${url}" target="_blank">Download</a></div></div>`;
}

function logout() { localStorage.removeItem('vai_apikey'); location.reload(); }
</script>
</body>
</html>
